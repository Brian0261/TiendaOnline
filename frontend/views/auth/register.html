<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registro - Bodega Luchito</title>
    <link rel="stylesheet" href="/assets/css/styles.css" />
    <link rel="stylesheet" href="/assets/css/auth.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.2/css/all.min.css" referrerpolicy="no-referrer" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
      body {
        background: linear-gradient(135deg, #f8f9fa 0%, #ffffff 100%);
        min-height: 100vh;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
      }
      .register-hero {
        width: 100%;
        background: linear-gradient(rgba(220, 53, 69, 0.87), rgba(52, 58, 64, 0.7)),
          url("/assets/images/banner-bodega.jpg") center center/cover no-repeat;
        color: #fff;
        padding: 12px 0 8px 0;
        text-align: center;
        position: relative;
        margin-bottom: 0;
      }
      .register-hero h1 {
        font-size: 2.3rem;
        font-weight: bold;
        text-shadow: 1px 2px 8px rgba(0, 0, 0, 0.25);
      }
      .register-hero p {
        font-size: 1.1rem;
        color: #ffe0e6;
        text-shadow: 1px 1px 3px rgba(52, 58, 64, 0.2);
        margin-bottom: 0;
      }
      .register-form-outer {
        flex: 1 0 auto;
        min-height: 60vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: none;
        width: 100%;
      }
      .register-form-wrapper {
        width: 100%;
        max-width: 430px;
        background: #fff;
        border-radius: 14px;
        box-shadow: 0 6px 40px rgba(220, 53, 69, 0.12);
        padding: 24px 28px 20px 28px;
        margin: 18px 0;
      }
      .register-form-wrapper .form-label {
        color: #343a40;
        font-weight: 500;
      }
      .register-form-wrapper .btn {
        background: #dc3545;
        border-color: #dc3545;
        font-weight: bold;
        font-size: 1.1rem;
        letter-spacing: 0.02em;
        border-radius: 8px;
      }
      .register-form-wrapper .btn:hover,
      .register-form-wrapper .btn:focus {
        background: #bb2d3b;
        border-color: #bb2d3b;
      }
      .register-form-wrapper .form-text {
        font-size: 0.92rem;
      }
      @media (max-width: 600px) {
        .register-hero {
          padding: 32px 0 8px 0;
        }
        .register-form-outer {
          align-items: flex-start;
          min-height: unset;
        }
        .register-form-wrapper {
          padding: 18px 8px 12px 8px;
          margin: 18px 0;
        }
      }
      /* Solo afecta los .mb-3 dentro del formulario de registro */
      #register-form .mb-3 {
        margin-bottom: 0.2rem; /* puedes probar con el valor que te guste */
      }
    </style>
  </head>
  <body>
    <!-- Navbar -->
    <div id="navbar-container"></div>

    <!-- Hero/banner registro -->
    <section class="register-hero">
      <h1>Unete a la familia de Bodega Luchito</h1>
      <p>Crea tu cuenta para acceder a los mejores precios, ofertas exclusivas y delivery rÃ¡pido.</p>
    </section>

    <!-- Contenedor centrado para el formulario -->
    <div class="register-form-outer">
      <div class="register-form-wrapper shadow">
        <form id="register-form" autocomplete="off">
          <div class="mb-3">
            <label for="nombre" class="form-label">Nombre completo</label>
            <input type="text" id="nombre" class="form-control" required autocomplete="given-name" />
          </div>
          <div class="mb-3">
            <label for="apellido" class="form-label">Apellido</label>
            <input type="text" id="apellido" class="form-control" required autocomplete="family-name" />
          </div>
          <div class="mb-3">
            <label for="email" class="form-label">Correo electrÃ³nico</label>
            <input type="email" id="email" class="form-control" required autocomplete="email" />
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">ContraseÃ±a</label>
            <input type="password" id="password" class="form-control" required autocomplete="new-password" />
            <div id="passwordHelpBlock" class="form-text">La contraseÃ±a debe tener al menos 8 caracteres, una mayÃºscula y un nÃºmero.</div>
          </div>
          <div class="mb-3">
            <label for="telefono" class="form-label">TelÃ©fono <span class="text-muted">(opcional)</span></label>
            <input type="text" id="telefono" class="form-control" autocomplete="tel" />
          </div>
          <div class="mb-3">
            <label for="direccion" class="form-label">DirecciÃ³n principal</label>
            <input type="text" id="direccion" class="form-control" required autocomplete="address-line1" />
          </div>
          <button type="submit" class="btn btn-danger w-100">Registrarse</button>
        </form>
        <!-- Div para mostrar errores de registro -->
        <div id="error-message" class="alert alert-danger mt-2" style="display: none"></div>
        <div class="mt-3 text-center">
          <p>Â¿Ya tienes cuenta? <a href="#" class="fw-bold text-danger" data-bs-toggle="modal" data-bs-target="#loginModal">Inicia sesiÃ³n aquÃ­</a></p>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div id="footer-container"></div>

    <div id="modal-container"></div>

    <!-- Scripts -->
    <script src="/assets/js/auth/register.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module">
      import("/assets/js/shared/partials-init.js");
    </script>
  </body>
</html>
