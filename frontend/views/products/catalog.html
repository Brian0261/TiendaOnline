<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Catálogo de Productos - Bodega Luchito</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- PolÃƒÂ­tica CSP mÃƒÂ­nima para desarrollo local -->
    

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="/assets/css/styles.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.0.0/css/all.min.css" />

    <!--  Estilos locales (puedes extraerlos a un .css si lo prefieres) -->
    <style>
      :root {
        --primary-color: #dc3545;
        --secondary-color: #343a40;
        --light-color: #f8f9fa;
        --dark-color: #212529;
        --accent-color: #ffc107;
      }

      html,
      body {
        height: 100%;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        color: var(--dark-color);
      }

      section.py-4.container {
        flex: 1;
      }

      /* Tarjeta de producto */
      .product-card {
        border: none;
        border-radius: 10px;
        overflow: hidden;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        transition: box-shadow 0.3s ease;
        margin-bottom: 20px;
        height: 100%;
      }
      .product-card:hover {
        box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
      }
      .product-img {
        max-height: 150px;
        object-fit: contain;
        width: 100%;
        padding: 10px;
      }

      /* Botones / textos primarios */
      .btn-primary-custom {
        background-color: var(--primary-color);
        border-color: var(--primary-color);
        color: white;
      }
      .btn-primary-custom:hover {
        background-color: #c82333;
        border-color: #bd2130;
      }
      .text-primary-custom {
        color: var(--primary-color) !important;
      }
      .badge-custom {
        background-color: var(--primary-color);
      }

      /* Sin resultados */
      .no-results {
        padding: 50px 0;
        text-align: center;
      }
      .no-results i {
        font-size: 3rem;
        color: #ccc;
        margin-bottom: 1rem;
      }
    </style>
  </head>

  <body>
    <!-- Navbar parcial -->
    <div id="navbar-container"></div>

    <!--  CONTENIDO PRINCIPAL  -->
    <section class="py-4 container">
      <div class="text-center mb-5">
        <h2 class="fw-bold">Catálogo de Productos</h2>
        <p class="text-muted">Encuentra todos nuestros productos disponibles</p>
      </div>

      <!-- Filtros -->
      <div class="row mb-4 g-3">
        <!--  CategorÃƒÂ­a  se llena dinÃƒÂ¡micamente -->
        <div class="col-md-4">
          <select class="form-select" id="category-select">
            <option value="">Todas las categorí­as</option>
          </select>
        </div>

        <!-- Orden -->
        <div class="col-md-4">
          <select class="form-select" id="sort-select">
            <option value="">Ordenar por</option>
            <option value="precio_asc">Precio: Menor a Mayor</option>
            <option value="precio_desc">Precio: Mayor a Menor</option>
            <option value="nuevo">Novedades</option>
            <option value="popular">Más populares</option>
          </select>
        </div>

        <!-- LÃƒÂ­mite -->
        <div class="col-md-4">
          <div class="input-group">
            <span class="input-group-text">Mostrar</span>
            <select class="form-select" id="limit-select">
              <option value="10">10</option>
              <option value="20">20</option>
              <option value="50">50</option>
              <option value="100">100</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Grid de productos -->
      <div class="row g-4" id="product-grid"></div>

      <!-- Sin resultados -->
      <div id="no-results" class="no-results" style="display: none">
        <i class="fas fa-search"></i>
        <h4>No encontramos productos</h4>
        <p class="text-muted">Prueba con otros términos de búsqueda o filtros</p>
      </div>

      <!-- PaginaciÃƒÂ³n -->
      <nav aria-label="Page navigation" class="mt-4" id="pagination">
        <!-- se genera por JS -->
      </nav>
    </section>

    <!-- Footer parcial -->
    <div id="footer-container"></div>

    <!-- Modals parciales -->
    <div id="modal-container"></div>

    <!--  SCRIPTS  -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Helpers y lÃƒÂ³gica de negocio (type="module" para usar import/export) -->
    <script type="module" src="/assets/js/shared/api.js" defer></script>
    <script type="module" src="/assets/js/products/catalog.js" defer></script>
    <script type="module" src="/assets/js/shared/cartUtils.js" defer></script>
    <script type="module" src="/assets/js/shared/addToCart.js" defer></script>
    <script type="module" src="/assets/js/shared/partials-init.js" defer></script>
  </body>
</html>
