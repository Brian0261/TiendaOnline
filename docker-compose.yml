services:
  # --- PostgreSQL en contenedor (local) ---
  db:
    image: postgres:16-alpine
    container_name: tienda_postgres
    environment:
      POSTGRES_DB: db_tienda
      POSTGRES_USER: tienda_user
      POSTGRES_PASSWORD: "Tienda#2025!"
    volumes:
      - postgres_data_tienda:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tienda_user -d db_tienda"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - tienda_net

  db-init:
    image: postgres:16-alpine
    profiles:
      - init
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGHOST: db
      PGPORT: 5432
      PGUSER: tienda_user
      PGPASSWORD: "Tienda#2025!"
      PGDATABASE: db_tienda
    volumes:
      - ./apps/api/db/init:/init:ro
    entrypoint:
      [
        "/bin/sh",
        "-c",
        "set -e; for f in /init/*.sql; do echo '>> Ejecutando' $$f; psql -v ON_ERROR_STOP=1 -f $$f; done; echo 'OK Scripts completados'",
      ]
    networks:
      - tienda_net

  backend:
    build:
      context: .
      dockerfile: ./apps/api/Dockerfile
    container_name: tienda_api
    env_file:
      - ./apps/api/.env
    environment:
      PG_HOST: db
      PG_PORT: 5432
      PG_USER: tienda_user
      PG_PASSWORD: "Tienda#2025!"
      PG_DATABASE: db_tienda
      PG_SSL: "false"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    volumes:
      - ./apps/api/uploads:/repo/apps/api/uploads
    networks:
      - tienda_net

  frontend:
    build:
      context: .
      dockerfile: ./apps/web/Dockerfile
    container_name: tienda_web
    depends_on:
      - backend
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - tienda_net

volumes:
  postgres_data_tienda:

networks:
  tienda_net:
