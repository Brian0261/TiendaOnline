name: DB Governance (Supabase + Parity Gate)

on:
  pull_request:
    branches: ["main", "staging"]
    paths:
      - "supabase/migrations/**"
      - "apps/api/scripts/check-db-parity.js"
      - "apps/api/scripts/db-parity-contract.json"
      - ".github/workflows/db-migrations.yml"
  push:
    branches: ["main", "staging"]
    paths:
      - "supabase/migrations/**"
      - "apps/api/scripts/check-db-parity.js"
      - "apps/api/scripts/db-parity-contract.json"
      - ".github/workflows/db-migrations.yml"
  workflow_call:
    inputs:
      target_environment:
        description: "Target environment (staging|production)"
        required: true
        type: string

jobs:
  validate-migrations:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate migration file naming
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(supabase/migrations/*.sql)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No migration files found in supabase/migrations" >&2
            exit 1
          fi

          regex='^supabase/migrations/[0-9]{12}([0-9]{2})?_[a-z0-9_]+\.sql$'
          for f in "${files[@]}"; do
            if [[ ! "$f" =~ $regex ]]; then
              echo "Invalid migration filename: $f"
              echo "Expected format: YYYYMMDDHHMM_name.sql"
              exit 1
            fi
          done

      - name: Basic SQL sanity check
        shell: bash
        run: |
          set -euo pipefail
          if grep -RniE 'drop\s+table\s+[^iI]' supabase/migrations/*.sql; then
            echo "Potentially dangerous DROP TABLE without IF EXISTS"
            exit 1
          fi

  apply-and-parity:
    if: github.event_name == 'workflow_call' || github.event_name == 'push'
    needs: [validate-migrations]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      TARGET_ENV: ${{ github.event_name == 'workflow_call' && inputs.target_environment || (github.ref == 'refs/heads/main' && 'production' || 'staging') }}
      SUPABASE_DB_POOLER_HOST: ${{ secrets.SUPABASE_DB_POOLER_HOST }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "apps/api/package-lock.json"

      - name: Install API deps (for parity script)
        working-directory: apps/api
        run: npm ci

      - name: Resolve target Supabase credentials
        id: target
        shell: bash
        run: |
          set -euo pipefail
          if [ "${TARGET_ENV}" = "production" ]; then
            echo "project_ref=${{ secrets.SUPABASE_PROD_PROJECT_REF }}" >> "$GITHUB_OUTPUT"
            echo "db_password=${{ secrets.SUPABASE_PROD_DB_PASSWORD }}" >> "$GITHUB_OUTPUT"
          else
            echo "project_ref=${{ secrets.SUPABASE_STAGING_PROJECT_REF }}" >> "$GITHUB_OUTPUT"
            echo "db_password=${{ secrets.SUPABASE_STAGING_DB_PASSWORD }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Login to Supabase
        run: echo "$SUPABASE_ACCESS_TOKEN" | supabase login --no-browser

      - name: Link target project
        run: supabase link --project-ref "${{ steps.target.outputs.project_ref }}"

      - name: Apply migrations
        run: supabase db push --linked --password "${{ steps.target.outputs.db_password }}"

      - name: Run DB parity gatekeeper
        env:
          DB_PARITY_DATABASE_URL: postgresql://postgres.${{ steps.target.outputs.project_ref }}:${{ steps.target.outputs.db_password }}@${{ env.SUPABASE_DB_POOLER_HOST || 'aws-0-us-west-2.pooler.supabase.com' }}:5432/postgres
        run: |
          cd apps/api
          node scripts/check-db-parity.js --contract scripts/db-parity-contract.json
