name: CI/CD Governance (Atomic DB + App)

on:
  workflow_dispatch:
  push:
    branches: ["main", "staging"]
    paths:
      - "apps/api/**"
      - "apps/web/**"
      - "supabase/migrations/**"
      - "scripts/**"
      - "package.json"
      - ".github/workflows/build-push.yml"
      - ".github/workflows/db-migrations.yml"
      - ".github/governance/**"
  pull_request:
    branches: ["main", "staging"]
    paths:
      - "apps/api/**"
      - "apps/web/**"
      - "supabase/migrations/**"
      - "scripts/**"
      - "package.json"
      - ".github/workflows/build-push.yml"
      - ".github/workflows/db-migrations.yml"
      - ".github/governance/**"

jobs:
  env-governance:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      RAILWAY_PROD_SERVICE_ID: ${{ secrets.RAILWAY_PROD_SERVICE_ID }}
      RAILWAY_STAGING_SERVICE_ID: ${{ secrets.RAILWAY_STAGING_SERVICE_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Export production variables
        shell: bash
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_PROJECT_TOKEN_PROD }}
        run: |
          railway whoami --json || { echo "::error::RAILWAY_PROJECT_TOKEN_PROD auth failed"; exit 1; }
          railway link --service "$RAILWAY_PROD_SERVICE_ID"
          railway variable list --json > .tmp_prod_vars.json

      - name: Export staging variables
        shell: bash
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_PROJECT_TOKEN_STAGING }}
        run: |
          railway whoami --json || { echo "::error::RAILWAY_PROJECT_TOKEN_STAGING auth failed"; exit 1; }
          railway link --service "$RAILWAY_STAGING_SERVICE_ID"
          railway variable list --json > .tmp_staging_vars.json

      - name: Validate critical environment parity
        run: |
          node scripts/check-env-parity.js \
            --contract .github/governance/env-contract.json \
            --prod .tmp_prod_vars.json \
            --staging .tmp_staging_vars.json

  db-governance:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging')
    uses: ./.github/workflows/db-migrations.yml
    needs: [env-governance]
    with:
      target_environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
    secrets: inherit

  build-api:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "apps/api/package-lock.json"

      - name: Verify controller (no p.stock)
        run: |
          if grep -n "p\.stock" apps/api/controllers/productController.ts; then
            echo "ERROR: p.stock found in controller"; exit 1;
          else
            echo "OK: no p.stock";
          fi

      - name: Install API deps
        working-directory: apps/api
        run: npm ci

      - name: Build API
        working-directory: apps/api
        run: npm run build

  build-web:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "apps/web/package-lock.json"

      - name: Install Web deps
        working-directory: apps/web
        run: npm ci

      - name: Build Web
        working-directory: apps/web
        run: npm run build

  smoke-business:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging')
    needs: [db-governance, build-api, build-web]
    runs-on: ubuntu-latest
    env:
      API_BASE_URL: ${{ github.ref == 'refs/heads/main' && 'https://api.minimarketexpress.shop' || 'https://api-staging.minimarketexpress.shop' }}
      SMOKE_STAFF_EMAIL: ${{ secrets.SMOKE_STAFF_EMAIL }}
      SMOKE_STAFF_PASSWORD: ${{ secrets.SMOKE_STAFF_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Business smoke suite (inbound + riders + kpis)
        run: node scripts/smoke-business.js