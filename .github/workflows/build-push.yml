name: CI Monorepo (Railway + Cloudflare)

on:
  workflow_dispatch:
  push:
    branches: ["main", "staging"]
    paths:
      - "apps/api/**"
      - "apps/web/**"
      - "package.json"
      - ".github/workflows/build-push.yml"
  pull_request:
    branches: ["main", "staging"]
    paths:
      - "apps/api/**"
      - "apps/web/**"
      - "package.json"
      - ".github/workflows/build-push.yml"

jobs:
  build-api:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/api/package-lock.json

      - name: Verify controller (no p.stock)
        run: |
          if grep -n "p\.stock" apps/api/controllers/productController.ts; then
            echo "ERROR: p.stock found in controller"; exit 1;
          else
            echo "OK: no p.stock";
          fi

      - name: Install API deps
        working-directory: apps/api
        run: npm ci

      - name: Build API
        working-directory: apps/api
        run: npm run build

  build-web:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install Web deps
        working-directory: apps/web
        run: npm ci

      - name: Build Web
        working-directory: apps/web
        run: npm run build

  smoke-production:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [build-api, build-web]
    runs-on: ubuntu-latest
    steps:
      - name: Smoke test sitio público
        run: |
          curl -fsS "https://minimarketexpress.shop" > /dev/null

      - name: Smoke test API Railway
        run: |
          curl -fsS "https://tiendaonline-production-5b3b.up.railway.app/health" > /dev/null

  trigger-railway:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [build-api, build-web]
    runs-on: ubuntu-latest
    env:
      RAILWAY_DEPLOY_HOOK_URL: ${{ secrets.RAILWAY_DEPLOY_HOOK_URL }}
    steps:
      - name: Trigger Railway Deploy Hook
        if: env.RAILWAY_DEPLOY_HOOK_URL != ''
        run: |
          curl -fsS -X POST "$RAILWAY_DEPLOY_HOOK_URL"
