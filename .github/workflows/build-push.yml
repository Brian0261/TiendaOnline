name: CI/CD Governance (Atomic DB + App)

on:
  workflow_dispatch:
  push:
    branches: ["main", "staging"]
    paths:
      - "apps/api/**"
      - "apps/web/**"
      - "supabase/migrations/**"
      - "scripts/**"
      - "package.json"
      - ".github/workflows/build-push.yml"
      - ".github/workflows/db-migrations.yml"
      - ".github/governance/**"
  pull_request:
    branches: ["main", "staging"]
    paths:
      - "apps/api/**"
      - "apps/web/**"
      - "supabase/migrations/**"
      - "scripts/**"
      - "package.json"
      - ".github/workflows/build-push.yml"
      - ".github/workflows/db-migrations.yml"
      - ".github/governance/**"

jobs:
  env-governance:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      RAILWAY_WORKSPACE_ID: ${{ secrets.RAILWAY_WORKSPACE_ID }}
      RAILWAY_PROD_PROJECT_ID: ${{ secrets.RAILWAY_PROD_PROJECT_ID }}
      RAILWAY_PROD_SERVICE_ID: ${{ secrets.RAILWAY_PROD_SERVICE_ID }}
      RAILWAY_STAGING_PROJECT_ID: ${{ secrets.RAILWAY_STAGING_PROJECT_ID }}
      RAILWAY_STAGING_SERVICE_ID: ${{ secrets.RAILWAY_STAGING_SERVICE_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Export production variables
        shell: bash
        run: |
          normalize() {
            printf '%s' "$1" | tr -d '\r\n' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//'
          }

          extract_railway_token() {
            local raw token
            raw="$(normalize "$1")"

            # Allow quoted or Authorization-like values accidentally pasted in GitHub Secrets.
            raw="${raw#\"}"
            raw="${raw%\"}"
            if [[ "$raw" =~ ^[Bb]earer[[:space:]]+ ]]; then
              raw="${raw#Bearer }"
              raw="${raw#bearer }"
            fi

            # If the secret was pasted as raw JSON, extract common token keys.
            if [[ "$raw" == \{* ]]; then
              token="$(RAW_RAILWAY_TOKEN="$raw" node -e "const raw = process.env.RAW_RAILWAY_TOKEN || ''; try { const obj = JSON.parse(raw); const candidate = obj.token || obj.accountToken || obj.apiToken || obj.accessToken || ''; if (!candidate) process.exit(2); process.stdout.write(String(candidate)); } catch { process.exit(2); }" 2>/dev/null || true)"
              if [ -n "$token" ]; then
                raw="$token"
              fi
            fi

            raw="$(normalize "$raw")"
            raw="${raw#\"}"
            raw="${raw%\"}"
            printf '%s' "$raw"
          }

          RAILWAY_TOKEN_CLEAN="$(extract_railway_token "$RAILWAY_TOKEN")"
          RAILWAY_WORKSPACE_ID_CLEAN="$(normalize "$RAILWAY_WORKSPACE_ID")"
          RAILWAY_PROD_PROJECT_ID_CLEAN="$(normalize "$RAILWAY_PROD_PROJECT_ID")"
          RAILWAY_PROD_SERVICE_ID_CLEAN="$(normalize "$RAILWAY_PROD_SERVICE_ID")"

          export RAILWAY_TOKEN="$RAILWAY_TOKEN_CLEAN"
          export RAILWAY_API_TOKEN="$RAILWAY_TOKEN_CLEAN"
          if [ ${#RAILWAY_TOKEN_CLEAN} -lt 20 ]; then
            echo "RAILWAY_TOKEN appears too short for API access" >&2
            exit 1
          fi
          echo "::notice::RAILWAY_TOKEN normalized length=${#RAILWAY_TOKEN_CLEAN}"

          if ! railway whoami --json >/dev/null 2>&1; then
            echo "::warning::RAILWAY_TOKEN rejected as API token; retrying with Railway session config"
            RAILWAY_ACCESS_TOKEN="$RAILWAY_TOKEN_CLEAN" node -e "const fs = require('fs'); const os = require('os'); const path = require('path'); const dir = path.join(os.homedir(), '.railway'); fs.mkdirSync(dir, { recursive: true }); const cfg = { projects: {}, user: { token: '', accessToken: process.env.RAILWAY_ACCESS_TOKEN || '', refreshToken: '', tokenExpiresAt: 4102444800 }, linkedFunctions: null }; fs.writeFileSync(path.join(dir, 'config.json'), JSON.stringify(cfg));"
            unset RAILWAY_TOKEN
            unset RAILWAY_API_TOKEN
            railway whoami --json >/dev/null
          fi

          railway link --workspace "$RAILWAY_WORKSPACE_ID_CLEAN" --project "$RAILWAY_PROD_PROJECT_ID_CLEAN" --environment production --service "$RAILWAY_PROD_SERVICE_ID_CLEAN"
          railway variable list --json > .tmp_prod_vars.json

      - name: Export staging variables
        shell: bash
        run: |
          normalize() {
            printf '%s' "$1" | tr -d '\r\n' | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//'
          }

          extract_railway_token() {
            local raw token
            raw="$(normalize "$1")"

            # Allow quoted or Authorization-like values accidentally pasted in GitHub Secrets.
            raw="${raw#\"}"
            raw="${raw%\"}"
            if [[ "$raw" =~ ^[Bb]earer[[:space:]]+ ]]; then
              raw="${raw#Bearer }"
              raw="${raw#bearer }"
            fi

            # If the secret was pasted as raw JSON, extract common token keys.
            if [[ "$raw" == \{* ]]; then
              token="$(RAW_RAILWAY_TOKEN="$raw" node -e "const raw = process.env.RAW_RAILWAY_TOKEN || ''; try { const obj = JSON.parse(raw); const candidate = obj.token || obj.accountToken || obj.apiToken || obj.accessToken || ''; if (!candidate) process.exit(2); process.stdout.write(String(candidate)); } catch { process.exit(2); }" 2>/dev/null || true)"
              if [ -n "$token" ]; then
                raw="$token"
              fi
            fi

            raw="$(normalize "$raw")"
            raw="${raw#\"}"
            raw="${raw%\"}"
            printf '%s' "$raw"
          }

          RAILWAY_TOKEN_CLEAN="$(extract_railway_token "$RAILWAY_TOKEN")"
          RAILWAY_WORKSPACE_ID_CLEAN="$(normalize "$RAILWAY_WORKSPACE_ID")"
          RAILWAY_STAGING_PROJECT_ID_CLEAN="$(normalize "$RAILWAY_STAGING_PROJECT_ID")"
          RAILWAY_STAGING_SERVICE_ID_CLEAN="$(normalize "$RAILWAY_STAGING_SERVICE_ID")"

          export RAILWAY_TOKEN="$RAILWAY_TOKEN_CLEAN"
          export RAILWAY_API_TOKEN="$RAILWAY_TOKEN_CLEAN"
          if [ ${#RAILWAY_TOKEN_CLEAN} -lt 20 ]; then
            echo "RAILWAY_TOKEN appears too short for API access" >&2
            exit 1
          fi
          echo "::notice::RAILWAY_TOKEN normalized length=${#RAILWAY_TOKEN_CLEAN}"

          if ! railway whoami --json >/dev/null 2>&1; then
            echo "::warning::RAILWAY_TOKEN rejected as API token; retrying with Railway session config"
            RAILWAY_ACCESS_TOKEN="$RAILWAY_TOKEN_CLEAN" node -e "const fs = require('fs'); const os = require('os'); const path = require('path'); const dir = path.join(os.homedir(), '.railway'); fs.mkdirSync(dir, { recursive: true }); const cfg = { projects: {}, user: { token: '', accessToken: process.env.RAILWAY_ACCESS_TOKEN || '', refreshToken: '', tokenExpiresAt: 4102444800 }, linkedFunctions: null }; fs.writeFileSync(path.join(dir, 'config.json'), JSON.stringify(cfg));"
            unset RAILWAY_TOKEN
            unset RAILWAY_API_TOKEN
            railway whoami --json >/dev/null
          fi

          railway link --workspace "$RAILWAY_WORKSPACE_ID_CLEAN" --project "$RAILWAY_STAGING_PROJECT_ID_CLEAN" --environment production --service "$RAILWAY_STAGING_SERVICE_ID_CLEAN"
          railway variable list --json > .tmp_staging_vars.json

      - name: Validate critical environment parity
        run: |
          node scripts/check-env-parity.js \
            --contract .github/governance/env-contract.json \
            --prod .tmp_prod_vars.json \
            --staging .tmp_staging_vars.json

  db-governance:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging')
    uses: ./.github/workflows/db-migrations.yml
    needs: [env-governance]
    with:
      target_environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
    secrets: inherit

  build-api:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "apps/api/package-lock.json"

      - name: Verify controller (no p.stock)
        run: |
          if grep -n "p\.stock" apps/api/controllers/productController.ts; then
            echo "ERROR: p.stock found in controller"; exit 1;
          else
            echo "OK: no p.stock";
          fi

      - name: Install API deps
        working-directory: apps/api
        run: npm ci

      - name: Build API
        working-directory: apps/api
        run: npm run build

  build-web:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "apps/web/package-lock.json"

      - name: Install Web deps
        working-directory: apps/web
        run: npm ci

      - name: Build Web
        working-directory: apps/web
        run: npm run build

  smoke-business:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging')
    needs: [db-governance, build-api, build-web]
    runs-on: ubuntu-latest
    env:
      API_BASE_URL: ${{ github.ref == 'refs/heads/main' && 'https://api.minimarketexpress.shop' || 'https://api-staging.minimarketexpress.shop' }}
      SMOKE_STAFF_EMAIL: ${{ secrets.SMOKE_STAFF_EMAIL }}
      SMOKE_STAFF_PASSWORD: ${{ secrets.SMOKE_STAFF_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Business smoke suite (inbound + riders + kpis)
        run: node scripts/smoke-business.js
