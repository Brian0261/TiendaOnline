<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Detalle de Producto - Bodega Luchito</title>

    <!-- Bootstrap y estilos del proyecto -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="/assets/css/styles.css" />
    <link rel="stylesheet" href="/assets/css/product.css" />

    <!-- Font Awesome por CDN (CSS) â†’ NO usar el kit .js para evitar CORS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.2/css/all.min.css" referrerpolicy="no-referrer" />

    <!-- CSP (habilita cdnjs para las fuentes) -->
    
  </head>
  <body>
    <div id="navbar-container"></div>

    <main class="container my-4">
      <div class="row g-4 align-items-start" id="product-detail">
        <div class="col-md-5">
          <img id="p-image" class="img-fluid rounded border" alt="Imagen del producto" onerror="this.src='/assets/images/placeholder-product.png'" />
        </div>
        <div class="col-md-7">
          <h1 id="p-name" class="h3 mb-2"></h1>
          <p id="p-desc" class="text-muted"></p>
          <div class="fs-3 fw-bold mb-3">S/ <span id="p-price">0.00</span></div>

          <div class="d-flex align-items-center gap-2 mb-3">
            <label class="me-2">Cantidad</label>
            <input id="qty" type="number" min="1" value="1" class="form-control" style="width: 110px" />
          </div>

          <button id="btnAdd" class="btn btn-danger"><i class="fa-solid fa-cart-plus me-2"></i> Agregar al Carrito</button>
        </div>
      </div>
    </main>

    <div id="footer-container"></div>
    <div id="modal-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="/assets/js/shared/partials-init.js"></script>
    <script type="module" src="/assets/js/products/detail.js"></script>
  </body>
</html>
